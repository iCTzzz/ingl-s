const cats = [...new Set(verbos.map(v => v[2]))].sort();
const sel = document.getElementById('catFilter');
cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c.charAt(0).toUpperCase() + c.slice(1); sel.appendChild(o); });

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const cat = sel.value;
  const filtered = verbos.filter(v => {
    const matchQ = !q || v[0].includes(q) || v[1].toLowerCase().includes(q);
    const matchC = !cat || v[2] === cat;
    return matchQ && matchC;
  });
  const grid = document.getElementById('grid');
  const nr = document.getElementById('noResults');
  const stats = document.getElementById('stats');
  if (!filtered.length) { grid.innerHTML=''; nr.style.display='block'; stats.textContent='0 verbos'; return; }
  nr.style.display='none';
  stats.textContent = filtered.length + ' verbo' + (filtered.length!==1?'s':'');
  grid.innerHTML = filtered.map(v =>
    `<div class="card"><div class="en">${v[0]}</div><div class="es">${v[1]}</div><span class="cat">${v[2]}</span></div>`
  ).join('');
}

document.getElementById('search').addEventListener('input', render);
sel.addEventListener('change', render);
