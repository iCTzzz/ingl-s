<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>400 Verbos en Inglés</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --surface: #1a1827;
    --card: #211f33;
    --accent: #e8c547;
    --accent2: #a78bfa;
    --text: #fffffe;
    --muted: #a7a5bb;
    --border: rgba(255,255,255,0.08);
    --green: #4ade80;
    --coral: #f87171;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    touch-action: pan-y;
    user-select: none;
  }

  .app {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* BG decoration */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }
  .bg-orb-1 { width: 300px; height: 300px; background: var(--accent2); top: -80px; left: -80px; }
  .bg-orb-2 { width: 250px; height: 250px; background: var(--accent); bottom: 80px; right: -60px; }

  /* HEADER */
  .header {
    position: relative;
    z-index: 10;
    padding: 20px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .logo span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .btn-search {
    width: 36px; height: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .btn-search:active { background: var(--card); }

  /* PROGRESS */
  .progress-wrap {
    position: relative;
    z-index: 10;
    padding: 0 24px 8px;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 300;
  }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.3s cubic-bezier(.4,0,.2,1);
  }

  /* CATEGORY FILTER */
  .cat-scroll {
    position: relative;
    z-index: 10;
    padding: 4px 24px 12px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    display: inline-block;
    padding: 6px 14px;
    margin-right: 8px;
    font-size: 12px;
    font-weight: 500;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }
  .cat-pill.active {
    background: var(--accent);
    color: #0f0e17;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* CARD AREA */
  .card-area {
    position: relative;
    z-index: 5;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    overflow: hidden;
  }

  .card-stack {
    position: relative;
    width: 100%;
    max-width: 360px;
    height: 380px;
  }

  /* Ghost cards behind */
  .card-ghost {
    position: absolute;
    inset: 0;
    background: var(--card);
    border-radius: 28px;
    border: 1px solid var(--border);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
  }
  .card-ghost-2 {
    transform: scale(0.92) translateY(18px);
    opacity: 0.5;
  }
  .card-ghost-3 {
    transform: scale(0.85) translateY(34px);
    opacity: 0.25;
  }

  /* Main card */
  .card-main {
    position: absolute;
    inset: 0;
    background: var(--card);
    border-radius: 28px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    cursor: grab;
    transition: transform 0.08s ease, box-shadow 0.2s;
    will-change: transform;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .card-main:active { cursor: grabbing; }
  .card-main.animating {
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s ease;
  }
  .card-main.slide-left {
    transform: translateX(-120%) rotate(-8deg) !important;
    opacity: 0;
  }
  .card-main.slide-right {
    transform: translateX(120%) rotate(8deg) !important;
    opacity: 0;
  }
  .card-main.slide-in-left {
    animation: slideInLeft 0.35s cubic-bezier(.4,0,.2,1) forwards;
  }
  .card-main.slide-in-right {
    animation: slideInRight 0.35s cubic-bezier(.4,0,.2,1) forwards;
  }

  @keyframes slideInLeft {
    from { transform: translateX(60%) rotate(5deg); opacity: 0; }
    to { transform: none; opacity: 1; }
  }
  @keyframes slideInRight {
    from { transform: translateX(-60%) rotate(-5deg); opacity: 0; }
    to { transform: none; opacity: 1; }
  }

  .card-number {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .card-cat-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 28px;
    background: rgba(232,197,71,0.12);
    color: var(--accent);
    border: 1px solid rgba(232,197,71,0.25);
  }
  .card-en {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .card-divider {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    margin: 0 auto 16px;
  }
  .card-es {
    font-size: 22px;
    font-weight: 300;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
  }

  /* Swipe hint */
  .swipe-hint {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: rgba(167,165,187,0.5);
    margin-top: 20px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  .swipe-hint svg { opacity: 0.4; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: relative;
    z-index: 10;
    padding: 12px 24px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .nav-btn {
    width: 56px; height: 56px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:active { transform: scale(0.93); background: var(--card); }
  .nav-btn.prev svg { transform: rotate(180deg); }

  .btn-fav {
    background: var(--surface);
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-fav.active { color: var(--coral); border-color: var(--coral); background: rgba(248,113,113,0.1); }

  .counter-pill {
    flex: 1;
    height: 56px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    cursor: pointer;
    transition: background 0.2s;
  }
  .counter-pill strong { color: var(--text); font-size: 16px; margin: 0 3px; font-weight: 500; }
  .counter-pill:active { background: var(--card); }

  /* SEARCH OVERLAY */
  .search-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,23,0.95);
    z-index: 100;
    display: flex;
    flex-direction: column;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .search-overlay.open { opacity: 1; pointer-events: all; }
  .search-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .search-input-wrap {
    flex: 1;
    position: relative;
  }
  .search-icon-inside {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
  }
  .search-input {
    width: 100%;
    height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    padding: 0 16px 0 44px;
    outline: none;
  }
  .search-input:focus { border-color: var(--accent2); }
  .search-cancel {
    font-size: 14px;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    padding: 8px;
  }
  .search-results {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .search-results::-webkit-scrollbar { display: none; }
  .search-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .search-item:active { opacity: 0.6; }
  .si-left .si-en { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }
  .si-left .si-es { font-size: 13px; color: var(--muted); margin-top: 2px; font-weight: 300; }
  .si-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 99px; background: rgba(232,197,71,0.12); color: var(--accent); border: 1px solid rgba(232,197,71,0.2); }
  .search-empty { text-align: center; color: var(--muted); padding: 3rem; font-size: 15px; }
</style>
</head>

const allCats = ["Todos", ...new Set(verbos.map(v => v[2]))].sort((a,b) => a==="Todos"?-1:b==="Todos"?1:a.localeCompare(b));
let currentCat = "Todos";
let filtered = [...verbos];
let idx = 0;
let favorites = new Set();
let dragging = false, startX = 0, startY = 0, currentX = 0;

const cardMain = document.getElementById('cardMain');
const cardEn = document.getElementById('cardEn');
const cardEs = document.getElementById('cardEs');
const cardCat = document.getElementById('cardCat');
const cardNumber = document.getElementById('cardNumber');
const progressFill = document.getElementById('progressFill');
const progressPct = document.getElementById('progressPct');
const progressLabel = document.getElementById('progressLabel');
const idxDisplay = document.getElementById('idxDisplay');
const totalDisplay = document.getElementById('totalDisplay');
const btnFav = document.getElementById('btnFav');
const catScroll = document.getElementById('catScroll');
const searchOverlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

function buildCategories() {
  catScroll.innerHTML = '';
  allCats.forEach(cat => {
    const pill = document.createElement('span');
    pill.className = 'cat-pill' + (cat === 'Todos' && currentCat === 'Todos' || cat === currentCat ? ' active' : '');
    pill.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    pill.addEventListener('click', () => {
      currentCat = cat === 'Todos' ? 'Todos' : cat;
      filtered = currentCat === 'Todos' ? [...verbos] : verbos.filter(v => v[2] === currentCat);
      idx = 0;
      buildCategories();
      updateCard('right');
    });
    catScroll.appendChild(pill);
  });
}

function updateCard(dir) {
  const v = filtered[idx];
  const num = String(idx + 1).padStart(3, '0');
  const total = filtered.length;
  const pct = Math.round(((idx + 1) / total) * 100);

  progressFill.style.width = pct + '%';
  progressPct.textContent = pct + '%';
  progressLabel.textContent = currentCat === 'Todos' ? 'Todos los verbos' : currentCat.charAt(0).toUpperCase() + currentCat.slice(1);
  idxDisplay.textContent = idx + 1;
  totalDisplay.textContent = total;
  cardNumber.textContent = num + ' / ' + String(total).padStart(3, '0');
  cardEn.textContent = v[0];
  cardEs.textContent = v[1];
  cardCat.textContent = v[2];

  const globalIdx = verbos.indexOf(v);
  btnFav.classList.toggle('active', favorites.has(globalIdx));

  if (dir) {
    cardMain.classList.remove('animating', 'slide-left', 'slide-right', 'slide-in-left', 'slide-in-right');
    void cardMain.offsetWidth;
    cardMain.classList.add('slide-in-' + dir);
    setTimeout(() => cardMain.classList.remove('slide-in-left', 'slide-in-right'), 400);
  }
}

function goNext() {
  if (idx < filtered.length - 1) { idx++; updateCard('left'); }
}
function goPrev() {
  if (idx > 0) { idx--; updateCard('right'); }
}

document.getElementById('btnNext').addEventListener('click', goNext);
document.getElementById('btnPrev').addEventListener('click', goPrev);

btnFav.addEventListener('click', () => {
  const v = filtered[idx];
  const globalIdx = verbos.indexOf(v);
  if (favorites.has(globalIdx)) favorites.delete(globalIdx);
  else favorites.add(globalIdx);
  btnFav.classList.toggle('active', favorites.has(globalIdx));
});

// Keyboard
document.addEventListener('keydown', e => {
  if (searchOverlay.classList.contains('open')) return;
  if (e.key === 'ArrowRight') goNext();
  else if (e.key === 'ArrowLeft') goPrev();
});

// Touch / drag
cardMain.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  dragging = true;
  currentX = 0;
  cardMain.style.transition = 'none';
}, { passive: true });

cardMain.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dx = e.touches[0].clientX - startX;
  const dy = e.touches[0].clientY - startY;
  if (Math.abs(dy) > Math.abs(dx) && Math.abs(currentX) < 10) return;
  currentX = dx;
  const rot = dx * 0.04;
  cardMain.style.transform = `translateX(${dx}px) rotate(${rot}deg)`;
}, { passive: true });

cardMain.addEventListener('touchend', () => {
  if (!dragging) return;
  dragging = false;
  cardMain.style.transition = '';
  if (currentX < -60) {
    cardMain.classList.add('animating', 'slide-left');
    setTimeout(() => { cardMain.style.transform = ''; goNext(); }, 300);
  } else if (currentX > 60) {
    cardMain.classList.add('animating', 'slide-right');
    setTimeout(() => { cardMain.style.transform = ''; goPrev(); }, 300);
  } else {
    cardMain.style.transform = '';
  }
});

// Mouse drag
cardMain.addEventListener('mousedown', e => {
  startX = e.clientX;
  dragging = true; currentX = 0;
  cardMain.style.transition = 'none';
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  currentX = e.clientX - startX;
  const rot = currentX * 0.04;
  cardMain.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`;
});
window.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  cardMain.style.transition = '';
  if (currentX < -80) {
    cardMain.classList.add('animating', 'slide-left');
    setTimeout(() => { cardMain.style.transform = ''; goNext(); }, 300);
  } else if (currentX > 80) {
    cardMain.classList.add('animating', 'slide-right');
    setTimeout(() => { cardMain.style.transform = ''; goPrev(); }, 300);
  } else {
    cardMain.style.transform = '';
  }
});

// Search
document.getElementById('btnSearch').addEventListener('click', () => {
  searchOverlay.classList.add('open');
  setTimeout(() => searchInput.focus(), 100);
  renderSearch('');
});
document.getElementById('searchCancel').addEventListener('click', () => {
  searchOverlay.classList.remove('open');
  searchInput.value = '';
});
searchInput.addEventListener('input', () => renderSearch(searchInput.value));

function renderSearch(q) {
  const term = q.toLowerCase().trim();
  const matches = verbos.filter(v => !term || v[0].includes(term) || v[1].toLowerCase().includes(term));
  if (!matches.length) {
    searchResults.innerHTML = '<div class="search-empty">No se encontraron resultados</div>';
    return;
  }
  searchResults.innerHTML = matches.slice(0, 80).map(v => {
    const i = verbos.indexOf(v);
    return `<div class="search-item" data-idx="${i}">
      <div class="si-left"><div class="si-en">${v[0]}</div><div class="si-es">${v[1]}</div></div>
      <span class="si-badge">${v[2]}</span>
    </div>`;
  }).join('');
  searchResults.querySelectorAll('.search-item').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.idx);
      currentCat = 'Todos';
      filtered = [...verbos];
      idx = i;
      buildCategories();
      updateCard('right');
      searchOverlay.classList.remove('open');
      searchInput.value = '';
    });
  });
}

buildCategories();
updateCard(null);
</script>
